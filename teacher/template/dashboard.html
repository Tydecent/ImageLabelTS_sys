        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>标注任务监控面板</title>
            <style>
                :root {
                    --bg: #f0f4f8;
                    --card-bg: #ffffff;
                    --primary: #4f6ef7;
                    --primary-hover: #3b54d4;
                    --success: #22c55e;
                    --success-bg: #dcfce7;
                    --success-border: #86efac;
                    --warning: #f59e0b;
                    --text: #1e293b;
                    --text-secondary: #64748b;
                    --border: #e2e8f0;
                    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
                    --shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.03);
                    --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
                    --radius: 12px;
                    --radius-sm: 8px;
                    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                    --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
                }

                * {
                    box-sizing: border-box;
                    margin: 0;
                    padding: 0;
                }

                body {
                    font-family: var(--font);
                    background: var(--bg);
                    color: var(--text);
                    min-height: 100vh;
                    padding: 2rem;
                    background-image:
                        radial-gradient(ellipse at 15% 20%, rgba(79, 110, 247, 0.04) 0%, transparent 60%),
                        radial-gradient(ellipse at 85% 75%, rgba(34, 197, 94, 0.03) 0%, transparent 60%),
                        radial-gradient(ellipse at 50% 50%, rgba(148, 163, 184, 0.03) 0%, transparent 70%);
                }

                /* ========== 主容器 ========== */
                .container {
                    max-width: 960px;
                    margin: 0 auto;
                    display: flex;
                    flex-direction: column;
                    gap: 1.5rem;
                }

                /* ========== 页头 ========== */
                .page-header {
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    flex-wrap: wrap;
                }

                .page-header .icon-wrapper {
                    width: 44px;
                    height: 44px;
                    border-radius: var(--radius-sm);
                    background: linear-gradient(135deg, #4f6ef7 0%, #7c8cf8 100%);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    flex-shrink: 0;
                    box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
                }

                .page-header .icon-wrapper svg {
                    width: 22px;
                    height: 22px;
                    fill: #fff;
                }

                .page-header h1 {
                    font-size: 1.65rem;
                    font-weight: 700;
                    letter-spacing: -0.02em;
                    color: #0f172a;
                    line-height: 1.2;
                }

                .page-header .subtitle {
                    font-size: 0.85rem;
                    color: var(--text-secondary);
                    font-weight: 400;
                    display: block;
                }

                /* ========== 总体进度卡片 ========== */
                .summary-card {
                    background: var(--card-bg);
                    border-radius: var(--radius);
                    padding: 1.25rem 1.5rem;
                    box-shadow: var(--shadow);
                    border: 1px solid var(--border);
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    flex-wrap: wrap;
                    transition: box-shadow var(--transition);
                }

                .summary-card:hover {
                    box-shadow: var(--shadow-lg);
                }

                .summary-card .summary-label {
                    font-weight: 600;
                    font-size: 0.9rem;
                    color: var(--text-secondary);
                    text-transform: uppercase;
                    letter-spacing: 0.04em;
                }

                .summary-card .summary-value {
                    font-weight: 700;
                    font-size: 1.4rem;
                    color: var(--primary);
                    letter-spacing: -0.01em;
                }

                .summary-card .summary-divider {
                    width: 1px;
                    height: 28px;
                    background: var(--border);
                    border-radius: 1px;
                    flex-shrink: 0;
                }

                .summary-card .summary-percent {
                    font-size: 2rem;
                    font-weight: 800;
                    letter-spacing: -0.02em;
                    color: #0f172a;
                    line-height: 1;
                }

                .summary-card .summary-sub {
                    font-size: 0.8rem;
                    color: var(--text-secondary);
                }

                /* 总体进度条 */
                .overall-progress-wrap {
                    flex: 1;
                    min-width: 180px;
                    display: flex;
                    flex-direction: column;
                    gap: 6px;
                }

                .overall-progress-bar-outer {
                    background: #e8ecf1;
                    border-radius: 20px;
                    height: 10px;
                    overflow: hidden;
                    width: 100%;
                }

                .overall-progress-bar-inner {
                    height: 100%;
                    border-radius: 20px;
                    background: linear-gradient(90deg, #4f6ef7 0%, #6d8afa 50%, #22c55e 100%);
                    transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.2);
                    position: relative;
                }

                .overall-progress-bar-inner::after {
                    content: '';
                    position: absolute;
                    right: 2px;
                    top: 2px;
                    bottom: 2px;
                    width: 6px;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.7);
                    animation: shimmer 2s infinite;
                }

                @keyframes shimmer {
                    0%,
                    100% {
                        opacity: 0.4;
                    }
                    50% {
                        opacity: 1;
                    }
                }

                /* ========== 表格容器 ========== */
                .table-wrapper {
                    background: var(--card-bg);
                    border-radius: var(--radius);
                    box-shadow: var(--shadow);
                    border: 1px solid var(--border);
                    overflow: hidden;
                }

                table {
                    border-collapse: collapse;
                    width: 100%;
                    font-size: 0.9rem;
                }

                thead {
                    background: #f8fafc;
                    border-bottom: 2px solid var(--border);
                }

                th {
                    padding: 14px 16px;
                    text-align: left;
                    font-weight: 700;
                    font-size: 0.78rem;
                    text-transform: uppercase;
                    letter-spacing: 0.05em;
                    color: var(--text-secondary);
                    white-space: nowrap;
                }

                th:first-child {
                    padding-left: 20px;
                }
                th:last-child {
                    text-align: center;
                    padding-right: 20px;
                }

                tbody tr {
                    border-bottom: 1px solid #f1f5f9;
                    transition: background-color var(--transition);
                }

                tbody tr:last-child {
                    border-bottom: none;
                }

                tbody tr.main-row:hover {
                    background-color: #f8fafd;
                }

                tbody tr.main-row {
                    cursor: default;
                }

                td {
                    padding: 14px 16px;
                    vertical-align: middle;
                    color: var(--text);
                }

                td:first-child {
                    padding-left: 20px;
                    font-weight: 600;
                    white-space: nowrap;
                }

                td:last-child {
                    text-align: center;
                    padding-right: 20px;
                }

                /* ========== 进度条单元格 ========== */
                .progress-cell {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    flex-wrap: wrap;
                }

                .progress-container {
                    background-color: #e8ecf1;
                    border-radius: 20px;
                    width: 130px;
                    height: 8px;
                    overflow: hidden;
                    flex-shrink: 0;
                }

                .progress-bar {
                    background: linear-gradient(90deg, #4f6ef7 0%, #22c55e 100%);
                    height: 100%;
                    border-radius: 20px;
                    transition: width 0.5s ease;
                    position: relative;
                }

                .progress-fraction {
                    font-weight: 600;
                    font-size: 0.85rem;
                    color: var(--text);
                    white-space: nowrap;
                    letter-spacing: -0.01em;
                }

                /* ========== 按钮 ========== */
                .btn-detail {
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    padding: 8px 16px;
                    background: #fff;
                    color: var(--primary);
                    border: 1.5px solid #dde4f7;
                    border-radius: 20px;
                    font-size: 0.8rem;
                    font-weight: 600;
                    cursor: pointer;
                    transition: all var(--transition);
                    white-space: nowrap;
                    font-family: var(--font);
                    letter-spacing: 0.01em;
                }

                .btn-detail:hover {
                    background: #f0f3ff;
                    border-color: var(--primary);
                    color: var(--primary-hover);
                    box-shadow: 0 2px 8px rgba(79, 110, 247, 0.15);
                    transform: translateY(-1px);
                }

                .btn-detail:active {
                    transform: scale(0.96);
                    background: #e8ecfe;
                }

                .btn-detail .arrow-icon {
                    display: inline-block;
                    transition: transform var(--transition);
                    font-size: 0.7rem;
                }

                .btn-detail.expanded .arrow-icon {
                    transform: rotate(180deg);
                }

                /* ========== 详情行 ========== */
                .detail-row {
                    display: none;
                    background: #fafbfd;
                }

                .detail-row td {
                    padding: 0 20px 20px 20px;
                }

                .detail-card {
                    background: #fff;
                    border: 1px solid #e8ecf1;
                    border-radius: var(--radius-sm);
                    padding: 1rem 1.25rem;
                    animation: fadeSlideIn 0.3s ease;
                    box-shadow: var(--shadow-sm);
                }

                @keyframes fadeSlideIn {
                    from {
                        opacity: 0;
                        transform: translateY(-8px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }

                .detail-card .detail-title {
                    font-weight: 700;
                    font-size: 0.82rem;
                    color: var(--text);
                    margin-bottom: 0.75rem;
                    text-transform: uppercase;
                    letter-spacing: 0.04em;
                    display: flex;
                    align-items: center;
                    gap: 6px;
                }

                .detail-card .detail-title::before {
                    content: '';
                    display: inline-block;
                    width: 4px;
                    height: 16px;
                    border-radius: 2px;
                    background: var(--primary);
                    flex-shrink: 0;
                }

                /* ========== 图片列表 - 一行一个（垂直排列） ========== */
                .image-list {
                    display: flex;
                    flex-direction: column;
                    gap: 6px;
                    margin-top: 4px;
                    max-height: 360px;
                    overflow-y: auto;
                    padding-right: 4px;
                }

                /* 自定义滚动条 */
                .image-list::-webkit-scrollbar {
                    width: 5px;
                }

                .image-list::-webkit-scrollbar-track {
                    background: transparent;
                    border-radius: 10px;
                }

                .image-list::-webkit-scrollbar-thumb {
                    background: #d4d9e2;
                    border-radius: 10px;
                }

                .image-list::-webkit-scrollbar-thumb:hover {
                    background: #b0b8c4;
                }

                .image-item {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    background: #f8fafc;
                    border: 1px solid #e8ecf1;
                    border-radius: 6px;
                    padding: 9px 14px;
                    font-size: 0.82rem;
                    font-weight: 500;
                    color: #475569;
                    transition: all var(--transition);
                    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
                    letter-spacing: 0.01em;
                    cursor: default;
                    word-break: break-all;
                }

                .image-item:hover {
                    background: #f1f5f9;
                    border-color: #ccd6e0;
                }

                .image-item .status-icon {
                    flex-shrink: 0;
                    width: 20px;
                    height: 20px;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 11px;
                    font-weight: 700;
                }

                .image-item.uploaded {
                    background: #f0fdf4;
                    border-color: #bbf7d0;
                    color: #166534;
                }

                .image-item.uploaded:hover {
                    background: #dcfce7;
                    border-color: #86efac;
                }

                .image-item.uploaded .status-icon {
                    background: #22c55e;
                    color: #fff;
                }

                .image-item.not-uploaded .status-icon {
                    background: #f1f5f9;
                    color: #94a3b8;
                    border: 1.5px solid #d4d9e2;
                }

                .image-item .img-name {
                    flex: 1;
                    min-width: 0;
                }

                .image-item .img-badge {
                    flex-shrink: 0;
                    font-size: 0.68rem;
                    font-weight: 700;
                    padding: 3px 8px;
                    border-radius: 10px;
                    letter-spacing: 0.03em;
                    text-transform: uppercase;
                }

                .image-item.uploaded .img-badge {
                    background: #bbf7d0;
                    color: #166534;
                }

                .image-item.not-uploaded .img-badge {
                    background: #f1f5f9;
                    color: #94a3b8;
                }

                /* ========== 空状态 & 加载 ========== */
                .loading-text {
                    color: var(--text-secondary);
                    font-style: italic;
                    font-size: 0.82rem;
                    padding: 4px 0;
                    animation: pulse 1.5s infinite;
                }

                @keyframes pulse {
                    0%,
                    100% {
                        opacity: 1;
                    }
                    50% {
                        opacity: 0.45;
                    }
                }

                .no-images {
                    color: #94a3b8;
                    font-size: 0.82rem;
                    padding: 8px 0;
                }

                /* ========== 响应式 ========== */
                @media (max-width: 640px) {
                    body {
                        padding: 1rem;
                    }

                    .page-header h1 {
                        font-size: 1.3rem;
                    }

                    .summary-card {
                        flex-direction: column;
                        align-items: flex-start;
                        gap: 0.6rem;
                    }

                    .summary-card .summary-divider {
                        display: none;
                    }

                    .progress-container {
                        width: 90px;
                    }

                    th,
                    td {
                        padding: 10px 8px;
                        font-size: 0.78rem;
                    }

                    td:first-child,
                    th:first-child {
                        padding-left: 10px;
                    }
                    td:last-child,
                    th:last-child {
                        padding-right: 10px;
                    }

                    .btn-detail {
                        padding: 6px 12px;
                        font-size: 0.72rem;
                    }

                    .detail-row td {
                        padding: 0 8px 14px 8px;
                    }

                    .image-item {
                        font-size: 0.74rem;
                        padding: 7px 10px;
                    }
                }

                @media (max-width: 400px) {
                    .progress-cell {
                        flex-direction: column;
                        align-items: flex-start;
                        gap: 4px;
                    }
                    .progress-container {
                        width: 100%;
                    }
                }
                /* 模态框遮罩 */
                .modal-overlay {
                    display: none; /* 默认隐藏 */
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(15, 23, 42, 0.6);
                    backdrop-filter: blur(2px);
                    z-index: 1000;
                    justify-content: center;
                    align-items: center;
                }
                .modal-overlay.active {
                    display: flex;
                }
                .modal-dialog {
                    background: #fff;
                    border-radius: var(--radius);
                    padding: 1.8rem 2rem;
                    box-shadow: var(--shadow-lg);
                    max-width: 400px;
                    width: 90%;
                    animation: fadeSlideIn 0.2s ease;
                }
                .modal-dialog h3 {
                    margin: 0 0 1rem 0;
                    font-weight: 700;
                    color: var(--text);
                }
                .modal-dialog .form-row {
                    margin-bottom: 1.2rem;
                }
                .modal-dialog label {
                    display: block;
                    font-size: 0.82rem;
                    font-weight: 600;
                    color: var(--text-secondary);
                    margin-bottom: 6px;
                }
                .modal-dialog select,
                .modal-dialog input {
                    width: 100%;
                    padding: 10px 12px;
                    border: 1px solid var(--border);
                    border-radius: var(--radius-sm);
                    font-size: 0.9rem;
                    font-family: var(--font);
                    transition: border var(--transition);
                }
                .modal-dialog select:focus,
                .modal-dialog input:focus {
                    outline: none;
                    border-color: var(--primary);
                    box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
                }
                .modal-actions {
                    display: flex;
                    justify-content: flex-end;
                    gap: 0.8rem;
                    margin-top: 1.5rem;
                }
                .btn-cancel {
                    padding: 8px 18px;
                    border: 1px solid var(--border);
                    background: #fff;
                    border-radius: 20px;
                    cursor: pointer;
                    font-weight: 600;
                    transition: background 0.2s;
                }
                .btn-cancel:hover { background: #f1f5f9; }
                .btn-confirm {
                    padding: 8px 20px;
                    background: var(--primary);
                    color: #fff;
                    border: none;
                    border-radius: 20px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: background 0.2s;
                }
                .btn-confirm:hover { background: var(--primary-hover); }

                .btn-reassign:hover {
                    background: #e2e8f0 !important;
                    border-color: #94a3b8 !important;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <!-- 页头 -->
                <div class="page-header">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                    </div>
                    <div>
                        <h1>标注任务监控面板</h1>
                        <span class="subtitle">实时追踪团队标注进度</span>
                    </div>
                </div>

                <!-- 总体进度 -->
                <div class="summary-card" id="summary">
                    <span class="loading-text">正在加载数据…</span>
                </div>

                <!-- 学生表格 -->
                <div class="table-wrapper">
                    <table id="student-table">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>完成进度</th>
                                <th>最后上传时间</th>
                                <th style="text-align:center;">详情</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <script>
                // 增加时间格式化函数
                function formatTime(isoString) {
                    if (!isoString) return '未上传';
                    const date = new Date(isoString);
                    // 本地化格式：2025-04-01 14:35:22
                    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
                }

                async function loadData() {
                    const resp = await fetch('/api/overview');
                    const data = await resp.json();
                    const summary = data.total_overall;

                    // 渲染总体进度卡片
                    const percentOverall = ((summary.uploaded / summary.total) * 100).toFixed(1);
                    document.getElementById('summary').innerHTML = `
                                <span class="summary-label">📊 总体进度</span>
                                <span class="summary-value">${summary.uploaded} / ${summary.total}</span>
                                <span class="summary-divider"></span>
                                <span class="summary-percent">${percentOverall}%</span>
                                <span class="summary-sub">已完成</span>
                                <div class="overall-progress-wrap">
                                    <div class="overall-progress-bar-outer">
                                        <div class="overall-progress-bar-inner" style="width:${percentOverall}%;"></div>
                                    </div>
                                    <span style="font-size:0.72rem;color:#94a3b8;">剩余 ${summary.total - summary.uploaded} 张图片待标注</span>
                                </div>
                            `;

                    const tbody = document.getElementById('table-body');
                    tbody.innerHTML = '';
                    data.students.forEach((stu, idx) => {
                        const percent = (stu.uploaded / stu.total * 100).toFixed(1);
                        // 主数据行
                        const row = tbody.insertRow();
                        row.className = 'main-row';
                        // 姓名
                        row.insertCell(0).innerText = stu.name;
                        // 进度
                        row.insertCell(1).innerHTML = `
                                    <div class="progress-cell">
                                        <div class="progress-container">
                                            <div class="progress-bar" style="width:${percent}%;"></div>
                                        </div>
                                        <span class="progress-fraction">${stu.uploaded}/${stu.total} (${percent}%)</span>
                                    </div>
                                `;

                        const timeCell = row.insertCell(2);
                        timeCell.innerText = formatTime(stu.last_push);

                        // 按钮
                        const btnCell = row.insertCell(3);
                        const btn = document.createElement('button');
                        btn.className = 'btn-detail';
                        btn.innerHTML = '查看图片 <span class="arrow-icon">▾</span>';
                        btn.onclick = function() {
                            toggleDetail(idx, stu, btn);
                        };
                        btnCell.appendChild(btn);

                        // 隐藏的详情行
                        const detailRow = tbody.insertRow();
                        detailRow.className = 'detail-row';
                        detailRow.id = `detail-${idx}`;
                        const detailCell = detailRow.insertCell(0);
                        detailCell.colSpan = 4;
                        detailCell.innerHTML =
                            '<div id="detail-content-' + idx +
                            '" style="min-height:20px;"><span class="loading-text">点击查看后加载…</span></div>';
                        detailRow.style.display = 'none';
                    });
                    window.studentsData = data.students;
                    window.allStudentNames = data.students.map(s => s.name);
                }

                function toggleDetail(idx, stu, btnElement) {
                    const detailRow = document.getElementById(`detail-${idx}`);
                    const isVisible = detailRow.style.display !== 'none';
                    if (!isVisible) {
                        const uploadedSet = new Set(stu.uploaded_images);
                        // 去掉扩展名的辅助函数
                        const stripExt = (filename) => filename.replace(/\.[^/.]+$/, '');
                        const html = `
                                    <div class="detail-card">
                                        <div class="detail-title">📁 分配图片列表（共 ${stu.images.length} 张）</div>
                                        <div class="image-list">
                                            ${stu.images.map(img => {
                                                const baseName = stripExt(img);
                                                const isUploaded = uploadedSet.has(img) || uploadedSet.has(baseName);
                                                const cls = isUploaded ? 'uploaded' : 'not-uploaded';
                                                const icon = isUploaded ? '✓' : '—';
                                                const badge = isUploaded ? '已上传' : '未上传';
                                                return `
                                                <div class="image-item ${cls}">
                                                    <span class="status-icon">${icon}</span>
                                                    <span class="img-name" title="${img}">${img}</span>
                                                    <span class="img-badge">${badge}</span>
                                                    <button class="btn-reassign" 
                                                            data-image="${img}" 
                                                            data-from="${stu.name}" 
                                                            title="改派给其他学生"
                                                            style="margin-left:auto;background:none;border:1px solid #ccc;border-radius:4px;padding:2px 6px;font-size:0.7rem;cursor:pointer;">
                                                        ⇄ 改派
                                                    </button>
                                                </div>`;
                                            }).join('')}
                                        </div>
                                    </div>
                                `;
                        document.getElementById(`detail-content-${idx}`).innerHTML = html;
                        detailRow.style.display = 'table-row';
                        if (btnElement) {
                            btnElement.classList.add('expanded');
                            btnElement.innerHTML = '收起图片 <span class="arrow-icon">▾</span>';
                        }
                    } else {
                        detailRow.style.display = 'none';
                        if (btnElement) {
                            btnElement.classList.remove('expanded');
                            btnElement.innerHTML = '查看图片 <span class="arrow-icon">▾</span>';
                        }
                    }
                }

                loadData();
                // 打开改派模态框
                function openReassignModal(imageName, fromStudent) {
                    // 填充图片名和原学生
                    document.getElementById('reassign-image').value = imageName;
                    document.getElementById('reassign-from').value = fromStudent;
                    
                    // 构建目标学生下拉（排除 fromStudent）
                    const select = document.getElementById('reassign-to');
                    select.innerHTML = '<option value="">-- 请选择 --</option>';
                    if (window.allStudentNames) {
                        window.allStudentNames
                            .filter(name => name !== fromStudent)
                            .forEach(name => {
                                const opt = document.createElement('option');
                                opt.value = name;
                                opt.textContent = name;
                                select.appendChild(opt);
                            });
                    }
                    // 隐藏警告
                    document.getElementById('reassign-warning').style.display = 'none';
                    
                    // 显示模态框
                    document.getElementById('reassign-modal').classList.add('active');
                }

                // 关闭模态框
                function closeReassignModal() {
                    document.getElementById('reassign-modal').classList.remove('active');
                }

                // 执行改派请求
                async function submitReassign() {
                    const image = document.getElementById('reassign-image').value;
                    const fromStu = document.getElementById('reassign-from').value;
                    const toStu = document.getElementById('reassign-to').value;

                    if (!toStu) {
                        alert('请选择目标学生');
                        return;
                    }

                    const resp = await fetch('/reassign', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: image,
                            from_student: fromStu,
                            to_student: toStu
                        })
                    });
                    const result = await resp.json();
                    if (result.status === 'ok') {
                        alert(result.message + (result.warning ? '⚠️ ' + result.warning : ''));
                        closeReassignModal();
                        // 重新加载面板数据
                        await loadData();
                        // 关闭当前所有展开的详情（避免数据错乱）
                        document.querySelectorAll('.detail-row').forEach(row => row.style.display = 'none');
                        document.querySelectorAll('.btn-detail.expanded').forEach(btn => {
                            btn.classList.remove('expanded');
                            btn.innerHTML = '查看图片 <span class="arrow-icon">▾</span>';
                        });
                    } else {
                        alert('改派失败：' + result.message);
                    }
                }

                // ——— 绑定初始事件（在页面加载后执行）———
                // 因为 loadData 是异步加载的，绑定点击事件需要用事件委托，避免按钮刷新后失效
                document.addEventListener('click', function(e) {
                    // 点击按钮打开改派
                    if (e.target && e.target.classList.contains('btn-reassign')) {
                        const image = e.target.getAttribute('data-image');
                        const from = e.target.getAttribute('data-from');
                        openReassignModal(image, from);
                    }
                });

                // 模态框关闭按钮
                document.addEventListener('DOMContentLoaded', function() {
                    document.getElementById('modal-cancel-btn').addEventListener('click', closeReassignModal);
                    document.getElementById('modal-confirm-btn').addEventListener('click', submitReassign);
                    // 点击遮罩层也可关闭
                    document.getElementById('reassign-modal').addEventListener('click', function(e) {
                        if (e.target === this) closeReassignModal();
                    });
                });
            </script>

            <!-- 改派模态框 -->
            <div class="modal-overlay" id="reassign-modal">
                <div class="modal-dialog">
                    <h3>✋ 图片改派</h3>
                    <div class="form-row">
                        <label>图片名称</label>
                        <input type="text" id="reassign-image" readonly>
                    </div>
                    <div class="form-row">
                        <label>原归属学生</label>
                        <input type="text" id="reassign-from" readonly>
                    </div>
                    <div class="form-row">
                        <label>新归属学生</label>
                        <select id="reassign-to">
                            <option value="">-- 请选择 --</option>
                        </select>
                    </div>
                    <div id="reassign-warning" style="color:#e67e22;font-size:0.78rem;margin-top:8px;display:none;"></div>
                    <div class="modal-actions">
                        <button class="btn-cancel" id="modal-cancel-btn">取消</button>
                        <button class="btn-confirm" id="modal-confirm-btn">确认改派</button>
                    </div>
                </div>
            </div>
        </body>
        </html>
